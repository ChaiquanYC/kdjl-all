<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宠物模板 - KDJL 后台管理</title>
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar('pets')"></div>
<div class="main">
    <div th:replace="fragments/topbar :: topbar('宠物模板管理')"></div>
    <div class="content">
        <div class="card">
            <div class="flex-row">
                <input class="input" id="keyword" placeholder="搜索宠物名称" onkeydown="if(event.key==='Enter')search(1)">
                <button class="btn btn-primary" onclick="search(1)">搜索</button>
            </div>
            <table><thead><tr>
                <th>ID</th><th>名称</th><th>五行</th><th>成长率</th><th>HP</th><th>MP</th><th>AC</th><th>MC</th><th>技能</th>
            </tr></thead><tbody id="tbody"></tbody></table>
            <div class="pagination" id="pager"></div>
        </div>
    </div>
</div>
<script>
let page=1,total=0;
function search(p){ page=p||1; fetch('/api/admin/pets?keyword='+encodeURIComponent(document.getElementById('keyword').value)+'&page='+page).then(r=>r.json()).then(d=>{
    total=d.total;
    document.getElementById('tbody').innerHTML=d.list.map(p=>
        `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.wx}</td><td>${p.czl}</td><td>${p.hp}</td><td>${p.mp}</td><td>${p.ac}</td><td>${p.mc}</td><td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.skillList||'-'}</td></tr>`
    ).join('');
    renderPager();
});}
function renderPager(){ let pages=Math.ceil(total/20), html=''; for(let i=1;i<=pages;i++) html+=`<button class="${i===page?'current':''}" onclick="search(${i})">${i}</button>`; document.getElementById('pager').innerHTML=html; }
search(1);
</script>
</body>
</html>
