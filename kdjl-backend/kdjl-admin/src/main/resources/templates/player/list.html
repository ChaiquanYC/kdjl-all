<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玩家管理 - KDJL 后台管理</title>
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar('players')"></div>
<div class="main">
    <div th:replace="fragments/topbar :: topbar('玩家管理')"></div>
    <div class="content">
        <div class="card">
            <div class="flex-row">
                <input class="input" id="keyword" placeholder="搜索昵称/账号" onkeydown="if(event.key==='Enter')search(1)">
                <button class="btn btn-primary" onclick="search(1)">搜索</button>
            </div>
            <table><thead><tr>
                <th>ID</th><th>昵称</th><th>等级</th><th>金币</th><th>元宝</th><th>威望</th><th>状态</th><th>操作</th>
            </tr></thead><tbody id="tbody"></tbody></table>
            <div class="pagination" id="pager"></div>
        </div>
    </div>
</div>
<script>
let page=1, total=0;
function search(p){ page=p||1; fetch('/api/admin/players?keyword='+encodeURIComponent(document.getElementById('keyword').value)+'&page='+page+'&size=20').then(r=>r.json()).then(d=>{
    total=d.total;
    document.getElementById('tbody').innerHTML=d.list.map(p=>
        `<tr><td>${p.id}</td><td>${p.nickname||'-'}</td><td>${p.level}</td><td>${p.money}</td><td>${p.yb}</td><td>${p.prestige}</td><td><span class="tag ${p.online?'tag-green':'tag-red'}">${p.online?'在线':'离线'}</span></td><td><a class="btn btn-primary" href="/players/${p.id}">详情</a></td></tr>`
    ).join('');
    renderPager();
});}
function renderPager(){
    let pages=Math.ceil(total/20), html='';
    for(let i=1;i<=pages;i++) html+=`<button class="${i===page?'current':''}" onclick="search(${i})">${i}</button>`;
    document.getElementById('pager').innerHTML=html;
}
search(1);
</script>
</body>
</html>
