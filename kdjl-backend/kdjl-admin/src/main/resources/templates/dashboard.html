<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表盘 - KDJL 后台管理</title>
<link rel="stylesheet" href="/css/admin.css">
<style>
.chart-bar{display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 10px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-fill{width:100%;max-width:60px;background:linear-gradient(to top,#1890ff,#69c0ff);border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.chart-label{font-size:11px;color:#888}.chart-count{font-size:11px;color:#1890ff;font-weight:600}
.server-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.server-item{display:flex;justify-content:space-between;padding:8px 12px;background:#fafafa;border-radius:4px;font-size:13px}
.server-item .key{color:#888}.server-item .val{color:#333;font-weight:500}
</style>
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar('dashboard')"></div>
<div class="main">
<div th:replace="fragments/topbar :: topbar('仪表盘')"></div>
<div class="content">
<div class="stats-grid" id="statsGrid"></div>

<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px">
<div class="card"><h3>7日活跃趋势</h3>
<div class="chart-bar" id="chartBar"></div>
</div>
<div class="card"><h3>服务器状态</h3>
<div class="server-grid" id="serverInfo"></div>
</div>
</div>

<div class="card"><h3>快捷操作</h3>
<div class="flex-row">
    <a href="/players"><button class="btn btn-primary">玩家管理</button></a>
    <a href="/props"><button class="btn btn-default">道具浏览</button></a>
    <a href="/pets"><button class="btn btn-default">宠物模板</button></a>
    <a href="/payments"><button class="btn btn-default">消费统计</button></a>
</div>
</div>
</div>
</div>
<script>
fetch('/api/admin/stats').then(r=>r.json()).then(d=>{
    document.getElementById('statsGrid').innerHTML = [
        {label:'总注册玩家',num:d.totalPlayers,color:'#1890ff'},
        {label:'当前在线',num:d.onlineNow,color:'#52c41a'},
        {label:'今日活跃',num:d.todayActive,color:'#faad14'},
        {label:'宠物总数',num:d.totalPets,color:'#722ed1'},
        {label:'道具种类',num:d.totalProps,color:'#eb2f96'}
    ].map(i=>`<div class="stat-card"><div class="num" style="color:${i.color}">${i.num}</div><div class="label">${i.label}</div></div>`).join('');

    // Activity chart
    var trend=d.trend||[],maxCount=Math.max(1,...trend.map(t=>t.count));
    document.getElementById('chartBar').innerHTML=trend.map(t=>{
        var h=Math.max(4,(t.count/maxCount*120));
        return `<div class="chart-col"><span class="chart-count">${t.count}</span><div class="chart-fill" style="height:${h}px"></div><span class="chart-label">${t.date}</span></div>`;
    }).join('');

    // Server status
    document.getElementById('serverInfo').innerHTML=[
        ['运行时间',Math.floor(d.serverUptime/3600)+'时'+Math.floor(d.serverUptime%3600/60)+'分'],
        ['堆内存使用',d.heapUsed+'MB / '+d.heapMax+'MB'],
        ['数据库状态','<span style="color:#52c41a">●</span> '+d.dbStatus]
    ].map(([k,v])=>`<div class="server-item"><span class="key">${k}</span><span class="val">${v}</span></div>`).join('');
});
</script>
</body>
</html>
