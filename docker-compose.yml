version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: kdjl-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: kdjl
      MYSQL_USER: kdjl
      MYSQL_PASSWORD: kdjl_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: kdjl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
